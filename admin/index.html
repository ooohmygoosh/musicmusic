<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台概览</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>后台概览</h1>
        <nav class="nav">
          <a href="/" class="nav-link is-active">概览</a>
          <a href="/songs.html" class="nav-link">歌曲库</a>
          <a href="/users.html" class="nav-link">用户</a>
          <a href="/tags.html" class="nav-link">标签</a>
        </nav>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">保存</button>
        </div>
      </header>

      <section class="card">
        <h2>数据概览</h2>
        <div id="statsGrid" class="stats-grid"></div>
        <div class="quick-links">
          <a class="quick-card" href="/songs.html">
            <div class="quick-title">歌曲库</div>
            <div class="quick-sub">查看库存、复用情况、上下线状态和批量删除。</div>
          </a>
          <a class="quick-card" href="/users.html">
            <div class="quick-title">用户</div>
            <div class="quick-sub">查看画像、队列、创建歌曲和收益摘要。</div>
          </a>
          <a class="quick-card" href="/tags.html">
            <div class="quick-title">标签</div>
            <div class="quick-sub">维护标签池、黑名单和批量审核。</div>
          </a>
        </div>
        <div class="charts">
          <div>
            <h3>标签使用 Top</h3>
            <div id="tagUsage" class="bar-list"></div>
          </div>
          <div>
            <h3>行为分布</h3>
            <div id="feedbackSummary" class="bar-list"></div>
          </div>
        </div>
      </section>
    </div>

    <script src="./app.js?v=20260320-3"></script>
  </body>
</html>
