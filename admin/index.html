<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天谱乐 后台管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>天谱乐 后台管理</h1>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">保存</button>
        </div>
      </header>

      <section class="card">
        <h2>数据概览</h2>
        <div id="statsGrid" class="stats-grid"></div>
        <div class="charts">
          <div>
            <h3>标签使用 Top10</h3>
            <div id="tagUsage" class="bar-list"></div>
          </div>
          <div>
            <h3>用户行为分布</h3>
            <div id="feedbackSummary" class="bar-list"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>标签管理</h2>
        <div class="row">
          <input id="tagName" placeholder="标签名称" />
          <input id="tagType" placeholder="标签类型 (风格/情绪/场景等)" />
          <button id="addTag">新增</button>
        </div>
        <div id="tagList" class="list"></div>
      </section>

      <section class="card">
        <h2>用户反馈</h2>
        <button id="refreshFeedback">刷新</button>
        <div id="feedbackList" class="list"></div>
      </section>

      <section class="card">
        <h2>收藏歌曲</h2>
        <button id="refreshFavorites">刷新</button>
        <div id="favoritesList" class="list"></div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
