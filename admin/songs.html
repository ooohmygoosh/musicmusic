<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Song Library | TPY Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>Song Library</h1>
        <nav class="nav">
          <a href="/" class="nav-link">Overview</a>
          <a href="/songs.html" class="nav-link is-active">Songs</a>
          <a href="/users.html" class="nav-link">Users</a>
          <a href="/tags.html" class="nav-link">Tags</a>
        </nav>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">Save</button>
        </div>
      </header>

      <section class="card">
        <div class="row between">
          <h2>Library Songs</h2>
          <div class="row">
            <button id="refreshSongs">Refresh</button>
            <button id="bulkDeleteSongs" class="ghost-btn">Bulk Delete (files)</button>
          </div>
        </div>
        <div class="toolbar row">
          <input id="searchInput" placeholder="Search title, prompt, or tags" />
          <select id="availabilityFilter">
            <option value="">All status</option>
            <option value="true">Enabled only</option>
            <option value="false">Disabled only</option>
          </select>
          <select id="typeFilter">
            <option value="">All types</option>
            <option value="헙岐">Mood</option>
            <option value="루목">Style</option>
            <option value="있포">Instrument</option>
            <option value="끝쒼">Scene</option>
            <option value="쌘犁">Tempo</option>
          </select>
        </div>
        <div id="songList" class="list"></div>
      </section>
    </div>

    <script src="./songs.js"></script>
  </body>
</html>
