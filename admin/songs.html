<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Song Library</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>Song Library</h1>
        <nav class="nav">
          <a href="/" class="nav-link">Overview</a>
          <a href="/songs.html" class="nav-link is-active">Song Library</a>
          <a href="/users.html" class="nav-link">Users</a>
          <a href="/tags.html" class="nav-link">Tags</a>
        </nav>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">Save</button>
        </div>
      </header>

      <section class="card">
        <div class="row between">
          <h2>Inventory</h2>
          <button id="refreshSongs">Refresh</button>
        </div>
        <div class="toolbar row">
          <input id="searchInput" placeholder="Search title, prompt, tag, or creator" />
          <select id="availabilityFilter">
            <option value="">All status</option>
            <option value="true">Available</option>
            <option value="false">Disabled</option>
          </select>
          <select id="typeFilter">
            <option value="">All types</option>
            <option value="헙岐">Emotion</option>
            <option value="루목">Style</option>
            <option value="있포">Instrument</option>
            <option value="끝쒼">Scene</option>
            <option value="쌘犁">Tempo</option>
          </select>
        </div>
        <div class="selection-bar row between">
          <div id="songSelectionHint" class="muted">0 songs selected</div>
          <div class="row compact-row">
            <button id="clearSelection" class="ghost-btn" type="button">Clear</button>
            <button id="deleteSelected" class="danger-btn" type="button">Delete Selected</button>
          </div>
        </div>
        <div id="songList" class="list"></div>
      </section>
    </div>

    <script src="./songs.js?v=20260320-2"></script>
  </body>
</html>
