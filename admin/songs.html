<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歌曲库 | 天谱乐 后台管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>歌曲库管理</h1>
        <nav class="nav">
          <a href="/" class="nav-link">概览</a>
          <a href="/songs.html" class="nav-link is-active">歌曲库</a>
          <a href="/users.html" class="nav-link">用户数据</a>
          <a href="/tags.html" class="nav-link">标签管理</a>
        </nav>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">保存</button>
        </div>
      </header>

      <section class="card">
        <div class="row between">
          <h2>库存歌曲</h2>
          <button id="refreshSongs">刷新</button>
        </div>
        <div class="toolbar row">
          <input id="searchInput" placeholder="搜索标题、提示词、标签或创建者" />
          <select id="availabilityFilter">
            <option value="">全部状态</option>
            <option value="true">仅启用</option>
            <option value="false">仅停用</option>
          </select>
          <select id="typeFilter">
            <option value="">全部类别</option>
            <option value="情绪">情绪</option>
            <option value="风格">风格</option>
            <option value="乐器">乐器</option>
            <option value="场景">场景</option>
            <option value="节奏">节奏</option>
          </select>
        </div>
        <div class="selection-bar row between">
          <div id="songSelectionHint" class="muted">已选 0 首歌曲</div>
          <div class="row compact-row">
            <button id="clearSelection" class="ghost-btn" type="button">清空选择</button>
            <button id="deleteSelected" class="danger-btn" type="button">批量删除</button>
          </div>
        </div>
        <div id="songList" class="list"></div>
      </section>
    </div>

    <script src="./songs.js?v=20260320-1"></script>
  </body>
</html>
