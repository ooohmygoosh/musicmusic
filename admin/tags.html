<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>标签管理 | 天谱乐 后台管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>标签管理</h1>
        <nav class="nav">
          <a href="/" class="nav-link">概览</a>
          <a href="/songs.html" class="nav-link">歌曲库</a>
          <a href="/users.html" class="nav-link">用户数据</a>
          <a href="/tags.html" class="nav-link is-active">标签管理</a>
        </nav>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">保存</button>
        </div>
      </header>

      <section class="card">
        <div class="row between">
          <h2>标签池维护</h2>
          <button id="refreshTags">刷新</button>
        </div>
        <div class="row">
          <input id="tagName" placeholder="标签名称" />
          <input id="tagType" placeholder="标签类别（情绪/风格/乐器等）" />
          <input id="tagDescription" placeholder="补充说明，可选" />
          <button id="addTag">新增标签</button>
        </div>
        <div id="tagTypeSummary" class="stats-grid"></div>
        <div class="selection-bar row between">
          <div id="tagSelectionHint" class="muted">已选 0 个标签</div>
          <div class="row compact-row">
            <button id="clearTagSelection" class="ghost-btn" type="button">清空选择</button>
            <button id="disableSelectedTags" class="ghost-btn" type="button">批量停用</button>
            <button id="deleteSelectedTags" class="danger-btn" type="button">批量删除</button>
            <button id="deleteAndBlacklistTags" class="danger-btn" type="button">删除并拉黑</button>
          </div>
        </div>
        <div id="tagGroups" class="list"></div>
      </section>

      <section class="card">
        <div class="row between">
          <h2>屏蔽词</h2>
          <button id="refreshBlacklist">刷新</button>
        </div>
        <div class="row">
          <input id="blacklistWord" placeholder="单个屏蔽词" />
          <input id="blacklistReason" placeholder="备注，可选" />
          <button id="addBlacklist">新增屏蔽词</button>
        </div>
        <div class="bulk-panel">
          <textarea id="blacklistBulkText" rows="5" placeholder="批量写入屏蔽词，一行一个，或用逗号分隔"></textarea>
          <div class="row compact-row">
            <input id="blacklistBulkReason" placeholder="批量备注，可选" />
            <button id="addBlacklistBulk">批量写入</button>
          </div>
        </div>
        <div id="blacklistList" class="list"></div>
      </section>
    </div>

    <script src="./tags.js?v=20260320-1"></script>
  </body>
</html>
