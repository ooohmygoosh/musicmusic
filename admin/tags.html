<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tags</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>Tags</h1>
        <nav class="nav">
          <a href="/" class="nav-link">Overview</a>
          <a href="/songs.html" class="nav-link">Song Library</a>
          <a href="/users.html" class="nav-link">Users</a>
          <a href="/tags.html" class="nav-link is-active">Tags</a>
        </nav>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">Save</button>
        </div>
      </header>

      <section class="card">
        <div class="row between">
          <h2>Tag Pool</h2>
          <button id="refreshTags">Refresh</button>
        </div>
        <div class="row">
          <input id="tagName" placeholder="Tag name" />
          <input id="tagType" placeholder="Tag type" />
          <input id="tagDescription" placeholder="Description (optional)" />
          <button id="addTag">Add Tag</button>
        </div>
        <div id="tagTypeSummary" class="stats-grid"></div>
        <div class="selection-bar row between">
          <div id="tagSelectionHint" class="muted">0 tags selected</div>
          <div class="row compact-row">
            <button id="clearTagSelection" class="ghost-btn" type="button">Clear</button>
            <button id="disableSelectedTags" class="ghost-btn" type="button">Disable Selected</button>
            <button id="deleteSelectedTags" class="danger-btn" type="button">Delete Selected</button>
            <button id="deleteAndBlacklistTags" class="danger-btn" type="button">Delete + Blacklist</button>
          </div>
        </div>
        <div id="tagGroups" class="list"></div>
      </section>

      <section class="card">
        <div class="row between">
          <h2>Blacklist</h2>
          <button id="refreshBlacklist">Refresh</button>
        </div>
        <div class="row">
          <input id="blacklistWord" placeholder="Single word" />
          <input id="blacklistReason" placeholder="Reason (optional)" />
          <button id="addBlacklist">Add Word</button>
        </div>
        <div class="bulk-panel">
          <textarea id="blacklistBulkText" rows="5" placeholder="Bulk words, one per line or comma separated"></textarea>
          <div class="row compact-row">
            <input id="blacklistBulkReason" placeholder="Bulk reason (optional)" />
            <button id="addBlacklistBulk">Bulk Insert</button>
          </div>
        </div>
        <div id="blacklistList" class="list"></div>
      </section>

    <script src="./tags.js?v=20260320-2"></script>
  </body>
</html>
