<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>标签管理 | 天谱乐 后台管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>标签管理</h1>
        <nav class="nav">
          <a href="/" class="nav-link">概览</a>
          <a href="/users.html" class="nav-link">用户数据</a>
          <a href="/tags.html" class="nav-link is-active">标签管理</a>
        </nav>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">保存</button>
        </div>
      </header>

      <section class="card">
        <h2>新增标签</h2>
        <div class="row">
          <input id="tagName" placeholder="标签名称" />
          <input id="tagType" placeholder="标签类型 (风格/情绪/场景等)" />
          <button id="addTag">新增</button>
        </div>
        <div id="tagList" class="list"></div>
      </section>
    </div>

    <script src="./tags.js"></script>
  </body>
</html>
