<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>Users</h1>
        <nav class="nav">
          <a href="/" class="nav-link">Overview</a>
          <a href="/songs.html" class="nav-link">Song Library</a>
          <a href="/users.html" class="nav-link is-active">Users</a>
          <a href="/tags.html" class="nav-link">Tags</a>
        </nav>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">Save</button>
        </div>
      </header>

      <section class="card">
        <div class="row between">
          <h2>Account List</h2>
          <button id="refreshUsers">Refresh</button>
        </div>
        <div id="userSummaryCards" class="stats-grid"></div>
        <div id="userTable" class="table"></div>
      </section>

      <section class="card">
        <div class="row between">
          <h2 id="userDetailTitle">Account Detail</h2>
          <button id="refreshUserDetail">Refresh Detail</button>
        </div>
        <div id="userInfo" class="account-detail"></div>
        <div class="spacer"></div>
        <div id="userMetrics" class="stats-grid"></div>
        <div class="spacer"></div>
        <div class="detail-grid detail-grid-triple">
          <div>
            <h3>Favorites</h3>
            <div id="userFavorites" class="table"></div>
          </div>
          <div>
            <h3>Queue / Delivery History</h3>
            <div id="userSongs" class="table"></div>
          </div>
          <div>
            <h3>Created Songs</h3>
            <div id="userCreatedSongs" class="table"></div>
          </div>
        </div>
        <div class="spacer"></div>
        <h3>Tag Weights</h3>
        <div id="userTags" class="table"></div>
      </section>
    </div>

    <script src="./users.js?v=20260320-2"></script>
  </body>
</html>
