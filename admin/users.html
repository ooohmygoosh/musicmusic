<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户数据 | 天谱乐 后台管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <h1>用户数据</h1>
        <nav class="nav">
          <a href="/" class="nav-link">概览</a>
          <a href="/songs.html" class="nav-link">歌曲库</a>
          <a href="/users.html" class="nav-link is-active">用户数据</a>
          <a href="/tags.html" class="nav-link">标签管理</a>
        </nav>
        <div class="token">
          <input id="token" type="password" placeholder="Admin Token" />
          <button id="saveToken">保存</button>
        </div>
      </header>

      <section class="card">
        <div class="row between">
          <h2>用户列表</h2>
          <button id="refreshUsers">刷新</button>
        </div>
        <div id="userTable" class="table"></div>
      </section>

      <section class="card">
        <div class="row between">
          <h2 id="userDetailTitle">用户详情</h2>
          <button id="refreshUserDetail">刷新详情</button>
        </div>
        <div id="userInfo" class="table"></div>
        <div class="spacer"></div>
        <h3>收藏歌曲</h3>
        <div id="userFavorites" class="table"></div>
        <div class="spacer"></div>
        <h3>生成歌曲</h3>
        <div id="userSongs" class="table"></div>
        <div class="spacer"></div>
        <h3>标签权重</h3>
        <div id="userTags" class="table"></div>
      </section>
    </div>

    <script src="./users.js"></script>
  </body>
</html>
