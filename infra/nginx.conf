server {
  listen 80 default_server;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/lib/letsencrypt;
  }

  location /admin/ {
    proxy_pass http://api:8080/admin/;
  }

  location /api/ {
    proxy_pass http://api:8080/;
  }

  location /callback/ {
    proxy_pass http://api:8080/callback/;
  }

  location / {
    proxy_pass http://admin:80/;
  }
}

server {
  listen 80;
  server_name ooooooo0hmygooooooo0sh.xyz www.ooooooo0hmygooooooo0sh.xyz;

  location /.well-known/acme-challenge/ {
    root /var/lib/letsencrypt;
  }

  return 301 https://ooooooo0hmygooooooo0sh.xyz$request_uri;
}

server {
  listen 80;
  server_name api.ooooooo0hmygooooooo0sh.xyz;

  location /.well-known/acme-challenge/ {
    root /var/lib/letsencrypt;
  }

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name ooooooo0hmygooooooo0sh.xyz www.ooooooo0hmygooooooo0sh.xyz;

  ssl_certificate /etc/letsencrypt/live/ooooooo0hmygooooooo0sh.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ooooooo0hmygooooooo0sh.xyz/privkey.pem;

  location /admin/ {
    proxy_pass http://api:8080/admin/;
  }

  location /api/ {
    proxy_pass http://api:8080/;
  }

  location /callback/ {
    proxy_pass http://api:8080/callback/;
  }

  location / {
    proxy_pass http://admin:80/;
  }
}

server {
  listen 443 ssl;
  server_name api.ooooooo0hmygooooooo0sh.xyz;

  ssl_certificate /etc/letsencrypt/live/api.ooooooo0hmygooooooo0sh.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.ooooooo0hmygooooooo0sh.xyz/privkey.pem;

  location = /tags {
    proxy_pass http://api:8080/tags;
  }

  location = /generate {
    proxy_pass http://api:8080/generate;
  }

  location = /users {
    proxy_pass http://api:8080/users;
  }

  location = /init-tags {
    proxy_pass http://api:8080/init-tags;
  }

  location = /songs {
    proxy_pass http://api:8080/songs;
  }

  location = /feedback {
    proxy_pass http://api:8080/feedback;
  }

  location = /playlists {
    proxy_pass http://api:8080/playlists;
  }

  location = /favorites {
    proxy_pass http://api:8080/favorites;
  }

  location = /my-created-songs {
    proxy_pass http://api:8080/my-created-songs;
  }

  location /api/ {
    proxy_pass http://api:8080/;
  }

  location /callback/ {
    proxy_pass http://api:8080/callback/;
  }
}
